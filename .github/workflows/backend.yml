name: Backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Go vet, test, sqlc drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: Install sqlc
        run: |
          curl -fsSL -o /tmp/sqlc.tar.gz https://github.com/sqlc-dev/sqlc/releases/download/v1.31.1/sqlc_1.31.1_linux_amd64.tar.gz
          tar -xzf /tmp/sqlc.tar.gz -C /tmp
          sudo mv /tmp/sqlc /usr/local/bin/sqlc
      - name: sqlc generate (no drift)
        run: |
          sqlc generate
          git diff --exit-code internal/adapters/sqlite/sqlcgen/
