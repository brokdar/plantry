version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gocritic
    - misspell
  settings:
    misspell:
      # German words that look like English typos to a US-English dictionary.
      ignore-rules:
        - stange
        - stangen
  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [errcheck, unused]
      - path: "internal/adapters/sqlite/sqlcgen/"
        linters: [govet, errcheck, staticcheck, unused, gocritic, misspell]

formatters:
  enable:
    - gofumpt
