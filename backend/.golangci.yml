version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gocritic
    - misspell

formatters:
  enable:
    - gofumpt

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck, unused]
    - path: "internal/adapters/sqlite/sqlcgen/"
      linters: [all]
