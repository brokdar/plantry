services:
  plantry:
    build: .
    image: plantry:dev
    container_name: plantry
    ports:
      - "8080:8080"
    environment:
      PLANTRY_PORT: "8080"
      PLANTRY_DB_PATH: "/data/plantry.db"
      PLANTRY_LOG_LEVEL: "info"
      PLANTRY_FDC_API_KEY: "${PLANTRY_FDC_API_KEY:-}"
      PLANTRY_AI_PROVIDER: "${PLANTRY_AI_PROVIDER:-}"
      PLANTRY_AI_MODEL: "${PLANTRY_AI_MODEL:-}"
      PLANTRY_AI_API_KEY: "${PLANTRY_AI_API_KEY:-}"
      PLANTRY_AUTH_PASSWORD: "${PLANTRY_AUTH_PASSWORD:-}"
    volumes:
      - plantry-data:/data
    restart: unless-stopped

volumes:
  plantry-data:
